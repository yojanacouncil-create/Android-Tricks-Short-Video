name: Render Automation Video

on:
  repository_dispatch:
    types: [render_and_upload]
  workflow_dispatch:

jobs:
  build_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (For Subtitles)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick fonts-dejavu
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//g' /etc/ImageMagick-6/policy.xml

      - name: Install Libraries
        run: pip install requests moviepy==1.0.3 Pillow==9.5.0 edge-tts

      - name: Run Python Engine
        env:
          FULL_TEXT: ${{ github.event.client_payload.full_text }}
          SCENES_DATA: ${{ github.event.client_payload.scenes_data }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          RESUME_URL: ${{ github.event.client_payload.resume_url }}
          WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python render_video.py
